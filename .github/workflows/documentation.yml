name: Docs

# Builds the Sphinx documentation on every push to the synced branches and
# on pull requests, and deploys it to GitHub Pages (gh-pages branch) when a
# version tag is pushed to the public repository.

on:
  push:
    tags:
      - "v*"
    branches:
      - main
      - devel
  pull_request:
    branches:
      - devel

jobs:
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --group docs

      - name: Sphinx build
        run: uv run sphinx-build -W -b html docs _build

      - name: Deploy
        if: github.repository == 'qperfect-io/mimiq-qiskit' && startsWith(github.ref, 'refs/tags/')
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _build/
          force_orphan: true
