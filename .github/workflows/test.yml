name: Test

# Public-repo CI: runs the test suite on pushes to the synced branches and
# on pull requests. The MIMIQ dependency resolves from PyPI here (the
# private GitLab CI overrides it with a git ref for cross-repo testing).

on:
  push:
    branches:
      - main
      - devel
  pull_request:
    branches:
      - devel

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest -sxv
